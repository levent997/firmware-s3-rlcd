[env:esp32-s3-rlcd-42]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# 16 MB octal-PSRAM N16R8 module. The base board JSON is the 8 MB QD
# variant — override flash size and partition table so we can carve out a
# big LittleFS region for pushed character packs.
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_lfs.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    ; Firmware log verbosity (src/log.h): 0=silent 1=error 2=info 3=debug.
    ; Default (unset) = 3. For a low-power release build, drop to 1 to
    ; compile out the periodic [hb]/[shtc3] chatter (less USB-CDC traffic):
    ;   -DLOG_LEVEL=1
    -DLOG_LEVEL=3

lib_deps =
    olikraus/U8g2 @ ^2.35.30
    h2zero/NimBLE-Arduino @ ^1.4.2
    bblanchon/ArduinoJson @ ^7.0.0
    bitbank2/AnimatedGIF @ ^2.0.0

# Host-side unit tests for the Arduino-free pure logic (battery_math, ...).
# Run: pio test -e native   (needs a host g++ on PATH)
# Only battery_math.cpp is compiled here; the rest of src/ is Arduino code
# that won't build natively, so it's filtered out.
[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_src_filter = +<battery_math.cpp> +<token_window.cpp>
build_flags = -std=gnu++17 -Wall
