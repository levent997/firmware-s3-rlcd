[env:esp32-s3-rlcd-42]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

# 16 MB octal-PSRAM N16R8 module. The base board JSON is the 8 MB QD
# variant — override flash size and partition table so we can carve out a
# big LittleFS region for pushed character packs.
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.partitions = partitions_lfs.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    olikraus/U8g2 @ ^2.35.30
    h2zero/NimBLE-Arduino @ ^1.4.2
    bblanchon/ArduinoJson @ ^7.0.0
    bitbank2/AnimatedGIF @ ^2.0.0
